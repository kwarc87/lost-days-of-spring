<!doctype html>
<html lang="pl">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Lost Days of Spring - platformer game</title>
        <link rel="stylesheet" href="reset.css" />
        <link rel="stylesheet" href="style.css?v=1775672258818" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <div class="container">
            <div id="controls">
                <div>
                    <strong>Move</strong> <span>Left / Right Arrows</span>
                </div>
                <div><strong>Jump</strong> <span>Up Arrow</span></div>
                <div><strong>Shoot</strong> <span>Space</span></div>
                <div><strong>Crouch</strong> <span>C / Down Arrow</span></div>
                <div><strong>Pause</strong> <span>P</span></div>
            </div>
            <div id="cursor-pos"></div>
            <canvas id="game" width="1280" height="720"></canvas>
        </div>
        <script type="module">
            import { LostDaysOfSpring } from "./src/core/LostDaysOfSpring.js";
            const debug =
                new URLSearchParams(window.location.search).get("debug") ===
                "true";
            const game = new LostDaysOfSpring("game", debug);
            game.start();
        </script>
    </body>
</html>
