<!doctype html>
<html lang="pl">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Lost Days of Spring - platformer game</title>
        <link rel="stylesheet" href="reset.css" />
        <link rel="stylesheet" href="style.css?v=1777310631145" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Jacquard+12&family=Silkscreen:wght@400;700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <div id="cursor-pos"></div>
        <div class="container">
            <canvas id="game" width="1280" height="720"></canvas>
            <div id="loading">
                <span>Loading…</span>
            </div>
        </div>
        <script type="module">
            import { LostDaysOfSpring } from "./src/core/LostDaysOfSpring.js";
            import {
                preloadImages,
                preloadFonts,
            } from "./src/utils/imgCache.js";

            const ASSETS = [
                "textures/all-props.png",
                "textures/tilesets.png",
                "textures/tilesets-2.png",
                "textures/props.png",
                "textures/skull.png",
                "textures/gems-spritesheet.png",
                "textures/walls.png",
                "textures/background/background.png",
                "textures/background/middleground.png",
                "textures/player/pink/idle.png",
                "textures/player/pink/walk.png",
                "textures/player/pink/walk-shoot.png",
                "textures/player/pink/jump.png",
                "textures/player/pink/jump-shoot.png",
                "textures/player/pink/crouch.png",
                "textures/player/pink/crouch-shoot.png",
            ];

            const FONTS = [
                `400 14px "Silkscreen"`,
                `700 13px "Silkscreen"`,
                `bold 96px "Jacquard 12"`,
            ];

            const params = new URLSearchParams(window.location.search);

            const debug = params.get("debug") === "true";

            const levelParam = parseInt(params.get("level"), 10);
            const startLevel = levelParam === 2 ? 2 : 1;

            const initialHpParam = Number(params.get("initialHp"));
            const initialHp =
                Number.isFinite(initialHpParam) && initialHpParam > 0
                    ? initialHpParam
                    : 6;

            Promise.all([preloadImages(ASSETS), preloadFonts(FONTS)]).then(
                () => {
                    document.getElementById("loading").classList.add("done");
                    const game = new LostDaysOfSpring("game", debug, initialHp);
                    game.loadLevel(startLevel);
                    game.start();
                },
            );
        </script>
    </body>
</html>
